<svg width="720" height="600" viewBox="0 0 720 600" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif">
  <style>
    .bg{fill:#ffffff}
    .title{fill:#1a1a2e;font-size:19px;font-weight:700}
    .h{font-size:14px;font-weight:600}
    .s{font-size:11.5px}
    .box{stroke-width:1.5;rx:9}
    .blue{fill:#eaf2ff;stroke:#4a86e8}
    .blueT{fill:#1a4480}
    .red{fill:#fdecec;stroke:#e24b4a}
    .redT{fill:#a01f1e}
    .gray{fill:#f1f3f5;stroke:#adb5bd}
    .grayT{fill:#343a40}
    .teal{fill:#e6f7f4;stroke:#20b2aa}
    .tealT{fill:#0b6157}
    .purple{fill:#efedfb;stroke:#7f77dd}
    .purpleT{fill:#3f3a8c}
    .arr{stroke:#495057;stroke-width:1.8;fill:none}
    .arrP{stroke:#7f77dd;stroke-width:2;fill:none}
    .lbl{fill:#6c757d;font-size:11px}
  </style>
  <rect class="bg" x="0" y="0" width="720" height="600"/>
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#495057" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="ap" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#7f77dd" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text class="title" x="40" y="40">The data platform the agent plugs into</text>
  <text class="lbl" x="40" y="62">Per-domain dbt repos build images; an engineer must manually paste each new tag into a separate config repo.</text>

  <!-- dbt repo -->
  <rect class="box blue" x="50" y="90" width="200" height="60" rx="9"/>
  <text class="h blueT" x="150" y="115" text-anchor="middle">per-domain dbt repo</text>
  <text class="s blueT" x="150" y="134" text-anchor="middle">dbt models (SQL code)</text>

  <!-- image registry -->
  <rect class="box blue" x="50" y="200" width="200" height="60" rx="9"/>
  <text class="h blueT" x="150" y="225" text-anchor="middle">image registry</text>
  <text class="s blueT" x="150" y="244" text-anchor="middle">container image + tag</text>
  <line x1="150" y1="150" x2="150" y2="198" class="arr" marker-end="url(#a)"/>
  <text class="lbl" x="162" y="178">build</text>

  <!-- config repo (manual, red) -->
  <rect class="box red" x="320" y="200" width="270" height="60" rx="9"/>
  <text class="h redT" x="455" y="222" text-anchor="middle">config repo — MANUAL step</text>
  <text class="s redT" x="455" y="240" text-anchor="middle">engineer waits, then pastes tag → typo risk</text>
  <line x1="250" y1="230" x2="318" y2="230" class="arr" marker-end="url(#a)"/>
  <text class="lbl" x="284" y="220" text-anchor="middle">wait</text>

  <!-- agent replaces this -->
  <rect class="box purple" x="320" y="90" width="270" height="60" rx="9"/>
  <text class="h purpleT" x="455" y="115" text-anchor="middle">the agent</text>
  <text class="s purpleT" x="455" y="134" text-anchor="middle">automates this error-prone step</text>
  <line x1="455" y1="150" x2="455" y2="198" class="arrP" marker-end="url(#ap)"/>
  <text class="lbl" x="467" y="178" fill="#7f77dd">replaces</text>

  <!-- Airflow -->
  <rect class="box gray" x="335" y="310" width="240" height="60" rx="9"/>
  <text class="h grayT" x="450" y="335" text-anchor="middle">Airflow (Composer)</text>
  <text class="s grayT" x="450" y="354" text-anchor="middle">reads config → builds a DAG</text>
  <line x1="450" y1="260" x2="450" y2="308" class="arr" marker-end="url(#a)"/>

  <!-- Cloud Run -->
  <rect class="box teal" x="330" y="420" width="240" height="60" rx="9"/>
  <text class="h tealT" x="450" y="445" text-anchor="middle">Cloud Run</text>
  <text class="s tealT" x="450" y="464" text-anchor="middle">runs dbt core inside the DAG</text>
  <line x1="450" y1="370" x2="450" y2="418" class="arr" marker-end="url(#a)"/>

  <!-- logger -->
  <rect class="box gray" x="330" y="520" width="240" height="46" rx="9"/>
  <text class="h grayT" x="450" y="547" text-anchor="middle">logs → logger</text>
  <line x1="450" y1="480" x2="450" y2="518" class="arr" marker-end="url(#a)"/>
</svg>
