<svg width="760" height="880" viewBox="0 0 760 880" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif">
  <style>
    .bg{fill:#ffffff}
    .title{fill:#1a1a2e;font-size:19px;font-weight:700}
    .h{font-size:13.5px;font-weight:600}
    .s{font-size:11px}
    .xs{font-size:10.5px}
    .blue{fill:#eaf2ff;stroke:#4a86e8}.blueT{fill:#1a4480}
    .red{fill:#fdecec;stroke:#e24b4a}.redT{fill:#a01f1e}
    .gray{fill:#f1f3f5;stroke:#adb5bd}.grayT{fill:#343a40}
    .teal{fill:#e6f7f4;stroke:#20b2aa}.tealT{fill:#0b6157}
    .purple{fill:#efedfb;stroke:#7f77dd}.purpleT{fill:#3f3a8c}
    .amber{fill:#fff6e6;stroke:#e0a53a}.amberT{fill:#8a5a00}
    .green{fill:#e9f7ec;stroke:#4caf50}.greenT{fill:#1e6b25}
    .agentbox{fill:#faf9ff;stroke:#7f77dd;stroke-width:1.8}
    .arr{stroke:#495057;stroke-width:1.8;fill:none}
    .arrR{stroke:#e24b4a;stroke-width:1.8;fill:none}
    .arrB{stroke:#4a86e8;stroke-width:1.8;fill:none}
    .lbl{fill:#6c757d;font-size:10.5px}
    .foot{fill:#3f3a8c;font-size:12px;font-weight:600}
  </style>
  <rect class="bg" x="0" y="0" width="760" height="880"/>
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#495057" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></marker>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#e24b4a" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></marker>
    <marker id="ab" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#4a86e8" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></marker>
  </defs>

  <text class="title" x="40" y="40">Agent system — two agents, async via Pub/Sub queues</text>

  <!-- Row 1: Jira -> webhook -> queue -->
  <rect class="gray" x="40" y="66" width="140" height="48" rx="8"/>
  <text class="h grayT" x="110" y="86" text-anchor="middle">Jira ticket</text>
  <text class="s grayT" x="110" y="103" text-anchor="middle">status: In Progress</text>

  <rect class="amber" x="220" y="66" width="130" height="48" rx="8"/>
  <text class="h amberT" x="285" y="86" text-anchor="middle">webhook</text>
  <text class="s amberT" x="285" y="103" text-anchor="middle">Cloud Run</text>
  <line x1="180" y1="90" x2="218" y2="90" class="arr" marker-end="url(#a)"/>

  <rect class="teal" x="390" y="66" width="330" height="48" rx="8"/>
  <text class="h tealT" x="555" y="86" text-anchor="middle">Pub/Sub queue · dv-jira-tickets</text>
  <text class="s tealT" x="555" y="103" text-anchor="middle">buffer + retry + dead-letter</text>
  <line x1="350" y1="90" x2="388" y2="90" class="arr" marker-end="url(#a)"/>

  <!-- Orchestrator agent box -->
  <rect class="agentbox" x="150" y="150" width="440" height="180" rx="12"/>
  <text class="h purpleT" x="370" y="172" text-anchor="middle">orchestrator agent · Agent Runtime</text>
  <line x1="555" y1="114" x2="555" y2="132" class="arr"/>
  <path d="M555 132 L555 140 L370 140 L370 148" class="arr" marker-end="url(#a)"/>

  <rect class="gray" x="170" y="186" width="190" height="44" rx="7"/>
  <text class="s grayT" x="265" y="212" text-anchor="middle">classify intent (LLM)</text>
  <rect class="gray" x="380" y="186" width="190" height="44" rx="7"/>
  <text class="s grayT" x="475" y="205" text-anchor="middle">domain / env gate</text>
  <text class="xs grayT" x="475" y="221" text-anchor="middle">typo-correct + prod guard</text>

  <rect class="red" x="170" y="244" width="190" height="48" rx="7"/>
  <text class="s redT" x="265" y="263" text-anchor="middle">SQL safety check</text>
  <text class="xs redT" x="265" y="280" text-anchor="middle">deterministic · runs early</text>
  <rect class="gray" x="380" y="244" width="190" height="48" rx="7"/>
  <text class="s grayT" x="475" y="263" text-anchor="middle">extract fields</text>
  <text class="xs grayT" x="475" y="280" text-anchor="middle">never fabricate values</text>

  <text class="xs purpleT" x="370" y="312" text-anchor="middle">deterministic gates · LLM only for language understanding</text>

  <!-- Dashboard (right) -->
  <rect class="blue" x="620" y="170" width="120" height="60" rx="8"/>
  <text class="h blueT" x="680" y="194" text-anchor="middle">dashboard</text>
  <text class="s blueT" x="680" y="212" text-anchor="middle">HITL resume</text>
  <path d="M590 200 L618 190" class="arrB" marker-end="url(#ab)"/>
  <path d="M618 214 L590 226" class="arrB" marker-end="url(#ab)"/>
  <text class="lbl" x="680" y="246" text-anchor="middle" fill="#4a86e8">pause ↔ answer</text>

  <!-- Rejected (left) -->
  <rect class="red" x="20" y="170" width="120" height="60" rx="8"/>
  <text class="h redT" x="80" y="194" text-anchor="middle">rejected queue</text>
  <text class="s redT" x="80" y="212" text-anchor="middle">+ Jira comment</text>
  <path d="M148 220 L142 220" class="arrR" marker-end="url(#ar)"/>
  <path d="M150 240 Q80 250 80 232" class="arrR" marker-end="url(#ar)"/>

  <!-- Two output paths -->
  <rect class="teal" x="60" y="380" width="290" height="52" rx="8"/>
  <text class="h tealT" x="205" y="401" text-anchor="middle">Pub/Sub queue · dv-model-image-ready</text>
  <text class="s tealT" x="205" y="419" text-anchor="middle">async wake — config path</text>
  <path d="M300 330 L300 356 L205 356 L205 378" class="arr" marker-end="url(#a)"/>
  <text class="lbl" x="240" y="350" text-anchor="start">config_only → publish</text>

  <rect class="green" x="410" y="380" width="290" height="52" rx="8"/>
  <text class="h greenT" x="555" y="401" text-anchor="middle">model PR → dbt repo</text>
  <text class="s greenT" x="555" y="419" text-anchor="middle">human merge → CI builds image</text>
  <path d="M440 330 L440 356 L555 356 L555 378" class="arr" marker-end="url(#a)"/>
  <text class="lbl" x="530" y="350" text-anchor="start">model → PR</text>

  <!-- CI re-publish loop -->
  <path d="M555 432 L555 456 L205 456 L205 480" class="arr" marker-end="url(#a)"/>
  <text class="lbl" x="380" y="450" text-anchor="middle">CI re-publishes the built image reference → same queue</text>

  <!-- Config agent box -->
  <rect class="agentbox" x="60" y="500" width="500" height="150" rx="12"/>
  <text class="h purpleT" x="310" y="522" text-anchor="middle">config agent · Agent Runtime</text>
  <line x1="205" y1="432" x2="205" y2="498" class="arr" marker-end="url(#a)"/>

  <rect class="gray" x="80" y="536" width="220" height="44" rx="7"/>
  <text class="s grayT" x="190" y="562" text-anchor="middle">script-first build (deterministic)</text>
  <rect class="amber" x="320" y="536" width="220" height="44" rx="7"/>
  <text class="s amberT" x="430" y="555" text-anchor="middle">LLM fallback</text>
  <text class="xs amberT" x="430" y="571" text-anchor="middle">only when needed — saves cost</text>

  <rect class="gray" x="80" y="592" width="460" height="42" rx="7"/>
  <text class="s grayT" x="310" y="612" text-anchor="middle">deterministic validate · keep existing image or schedule by `source`</text>
  <text class="xs grayT" x="310" y="627" text-anchor="middle">config_only keeps image · model keeps schedule</text>

  <!-- Config PR -->
  <rect class="gray" x="180" y="690" width="300" height="52" rx="8"/>
  <text class="h grayT" x="330" y="711" text-anchor="middle">config PR → platform-config repo</text>
  <text class="s grayT" x="330" y="729" text-anchor="middle">human reviews and merges (no auto-merge)</text>
  <line x1="310" y1="650" x2="330" y2="688" class="arr" marker-end="url(#a)"/>

  <!-- Footers -->
  <text class="foot" x="380" y="790" text-anchor="middle">Agents never call each other directly — every hop is a durable Pub/Sub queue.</text>
  <text class="foot" x="380" y="812" text-anchor="middle">Deterministic scripts do the work; the LLM is used only where reasoning is required.</text>
  <text class="lbl" x="380" y="838" text-anchor="middle">Each session gets a unique UUID; user_id = jira-&lt;ISSUE_KEY&gt; keeps concurrent tickets fully isolated.</text>
</svg>
